name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s $(ls -d /Applications/Xcode*.app | sort -V | tail -1)

      - name: Generate icons
        run: bash make-icons.sh

      - name: Build app
        run: make build

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Create DMG
        run: |
          rm -rf dmg-tmp
          mkdir -p dmg-tmp
          cp -r SpotifyController.app dmg-tmp/
          ln -s /Applications dmg-tmp/Applications
          hdiutil create -volname "SpotifyRemote" \
            -srcfolder dmg-tmp -ov -format UDZO \
            "SpotifyRemote-${{ env.VERSION }}.dmg"

      - name: Extract tag annotation
        run: |
          git fetch --tags --force
          echo "TAG_BODY<<EOF" >> $GITHUB_ENV
          git tag -l --format='%(contents)' ${{ github.ref_name }} >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: SpotifyRemote-*.dmg
          body: ${{ env.TAG_BODY }}
